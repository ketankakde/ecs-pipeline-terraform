name: Deploy on EC2

on:
  workflow_dispatch

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: terraform-vpc-ec2-rds
  ECR_REGISTRY: 160900807677.dkr.ecr.us-east-1.amazonaws.com
  FRONTEND_REPO: frontend
  BACKEND_REPO: backend

jobs:

  get-infra:
    name: Read Terraform Outputs
    runs-on: ubuntu-latest

    outputs:
      ec2_ip: ${{ steps.tf.outputs.ec2_ip }}
      rds_endpoint: ${{ steps.tf.outputs.rds_endpoint }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::160900807677:role/role-for-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Read Terraform Outputs
        id: tf
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "ec2_ip=$(terraform output -raw ec2_public_ip)" >> $GITHUB_OUTPUT
          echo "rds_endpoint=$(terraform output -raw rds_endpoint)" >> $GITHUB_OUTPUT

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: get-infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::160900807677:role/role-for-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Build Backend Image
        run: |
          docker build -t $BACKEND_REPO ./backend
          docker tag $BACKEND_REPO:latest $ECR_REGISTRY/$BACKEND_REPO:latest

      - name: Build Frontend Image
        run: |
          docker build -t $FRONTEND_REPO ./frontend
          docker tag $FRONTEND_REPO:latest $ECR_REGISTRY/$FRONTEND_REPO:latest

      - name: Push Images
        run: |
          docker push $ECR_REGISTRY/$BACKEND_REPO:latest
          docker push $ECR_REGISTRY/$FRONTEND_REPO:latest

  deploy-to-ec2:
    name: Deploy on EC2 using Docker
    runs-on: ubuntu-latest

    needs:
      - get-infra
      - build-and-push

    steps:
      - name: Debug Outputs
        run: |
          echo "EC2_IP=${{ needs.get-infra.outputs.ec2_ip }}"
          echo "RDS_ENDPOINT=${{ needs.get-infra.outputs.rds_endpoint }}"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ needs.get-infra.outputs.ec2_ip }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            aws ecr get-login-password --region us-east-1 | \
            sudo docker login --username AWS --password-stdin 160900807677.dkr.ecr.us-east-1.amazonaws.com

            sudo docker pull 160900807677.dkr.ecr.us-east-1.amazonaws.com/backend:latest
            sudo docker pull 160900807677.dkr.ecr.us-east-1.amazonaws.com/frontend:latest

            sudo docker rm -f backend frontend || true

            sudo docker run -d \
              --name backend \
              -p 5000:5000 \
              -e DB_HOST=${{ needs.get-infra.outputs.rds_endpoint }} \
              -e DB_NAME=student_registration \
              -e DB_USER=root \
              -e DB_PASSWORD=password123 \
              160900807677.dkr.ecr.us-east-1.amazonaws.com/backend:latest

            sudo docker run -d \
              --name frontend \
              -p 80:80 \
              160900807677.dkr.ecr.us-east-1.amazonaws.com/frontend:latest
